name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Generate Prisma clients
        run: npx prisma generate

      - name: Build shared package
        run: npm run build --workspace=@laptopguru-crm/shared

      - name: Lint
        run: npm run lint

      - name: Type check (web)
        run: npx tsc --project apps/web/tsconfig.json --noEmit

  build-and-push:
    name: Build & Push Image
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: version
        run: |
          CURRENT=$(node -p "require('./version.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "{\"version\":\"$NEW_VERSION\"}" > version.json
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add version.json
          git commit -m "v$NEW_VERSION"
          git push

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_BUILD_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: docker/metadata-action@v5
        id: meta-api
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Copy compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,Caddyfile,Caddyfile.prod"
          target: ${{ secrets.VPS_DEPLOY_PATH }}

      - name: Deploy (zero-downtime blue/green)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"

            # Login and pull new images
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin
            docker pull ghcr.io/denysdevelopment/laptopguru-crm:latest
            docker pull ghcr.io/denysdevelopment/laptopguru-crm-api:latest

            # Bring up everything that's not yet running (db, redis, caddy,
            # both app replicas, api). On the very first run after the
            # blue/green migration this creates app-blue and app-green from
            # scratch; on subsequent runs it's a no-op for unchanged services.
            $COMPOSE up -d --no-build

            # Reload Caddy with the (possibly updated) Caddyfile.prod so it
            # picks up any LB/health-check changes without dropping connections.
            $COMPOSE exec -T caddy caddy reload --config /etc/caddy/Caddyfile || \
              $COMPOSE up -d --no-deps --force-recreate caddy

            # --- Rolling restart of the web app, one replica at a time ---
            wait_healthy() {
              local svc="$1"
              local cid
              cid=$($COMPOSE ps -q "$svc")
              if [ -z "$cid" ]; then
                echo "ERROR: no container for $svc"
                return 1
              fi
              echo "Waiting for $svc ($cid) to become healthy..."
              for i in $(seq 1 60); do
                status=$(docker inspect -f '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "missing")
                if [ "$status" = "healthy" ]; then
                  echo "$svc is healthy"
                  return 0
                fi
                sleep 3
              done
              echo "ERROR: $svc did not become healthy in time"
              docker logs --tail=80 "$cid" || true
              return 1
            }

            for replica in app-blue app-green; do
              echo "=== Rolling: $replica ==="
              $COMPOSE up -d --no-deps --force-recreate --no-build "$replica"
              wait_healthy "$replica"
            done

            # API is single-instance — short restart is acceptable for the backend.
            $COMPOSE up -d --no-deps --force-recreate --no-build api

            # Clean up old images
            docker image prune -f

            # Final health check (Caddy → load-balanced upstreams)
            sleep 5
            curl -sf http://localhost:4000/api/health || echo "WARNING: API health check failed"
            curl -sf http://localhost/api/health -H "Host: ${{ secrets.DOMAIN || 'localhost' }}" || echo "WARNING: App health check via Caddy failed"
