name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Generate Prisma clients
        run: npx prisma generate

      - name: Build shared package
        run: npm run build --workspace=@laptopguru-crm/shared

      - name: Lint
        run: npm run lint

      - name: Type check (web)
        run: npx tsc --project apps/web/tsconfig.json --noEmit

  build-and-push:
    name: Build & Push Image
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          # Retry up to 5 times on push conflict (another push landed while this
          # job was running). Re-reads version.json after each pull so the
          # bump stays monotonic on main.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            CURRENT=$(node -p "require('./version.json').version")
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            echo "{\"version\":\"$NEW_VERSION\"}" > version.json
            git add version.json
            git commit -m "v$NEW_VERSION"
            if git push; then
              echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — retrying"
            sleep 2
          done
          echo "Failed to bump version after 5 attempts" >&2
          exit 1

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_BUILD_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: docker/metadata-action@v5
        id: meta-api
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v5

      - name: Copy compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,Caddyfile"
          target: ${{ secrets.VPS_DEPLOY_PATH }}

      - name: Deploy
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"

            # Sanitize ~/.docker/config.json: a previously copied Docker Desktop
            # config can contain credsStore:"desktop" / currentContext pointing
            # at desktop-linux. On a headless Linux VPS the docker-credential-
            # desktop helper doesn't exist, so "docker login" silently stores
            # nothing and "docker pull" gets "denied: denied" on private images.
            # Reset to a minimal config so creds land in plain auths.
            mkdir -p "$HOME/.docker"
            printf '%s\n' '{"auths":{}}' > "$HOME/.docker/config.json"

            # Login with the job-scoped GITHUB_TOKEN (packages:read) — same
            # mechanism the build-and-push job already uses to push. No PAT.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull ghcr.io/denysdevelopment/laptopguru-crm:latest
            docker pull ghcr.io/denysdevelopment/laptopguru-crm-api:latest

            # Stop and recreate app + api with new images, keep db/redis/caddy
            # running. --remove-orphans on the full "up -d" below cleans up
            # legacy app-blue / app-green containers left over from the
            # short-lived blue/green attempt.
            $COMPOSE up -d --force-recreate --no-build app api
            $COMPOSE up -d --remove-orphans

            # Clean up old images
            docker image prune -f

            # Health check
            sleep 20
            curl -sf http://localhost:4000/api/health || echo "WARNING: API health check failed"
            curl -sf http://localhost:3000/api/health || echo "WARNING: App health check failed"
