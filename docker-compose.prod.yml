services:
  app:
    image: ghcr.io/denysdevelopment/laptopguru-crm:latest
    build: !reset null
    restart: always
    volumes:
      - uploads:/app/public/uploads
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - IMAP_HOST=${IMAP_HOST}
      - IMAP_PORT=${IMAP_PORT}
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASSWORD=${IMAP_PASSWORD}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - YOUTUBE_CHANNEL_HANDLE=${YOUTUBE_CHANNEL_HANDLE}
      - APP_URL=${APP_URL}
      - INVITE_CODE=${INVITE_CODE}
      - HOSTNAME=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
      - DOMAIN=${DOMAIN}
      - INTERNAL_API_URL=http://api:4000
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_VIDEO_BUCKET=${AWS_S3_VIDEO_BUCKET}
      - AWS_CLOUDFRONT_DOMAIN=${AWS_CLOUDFRONT_DOMAIN}
      - AWS_CLOUDFRONT_DISTRIBUTION_ID=${AWS_CLOUDFRONT_DISTRIBUTION_ID}
      - AWS_CLOUDFRONT_KEY_PAIR_ID=${AWS_CLOUDFRONT_KEY_PAIR_ID}
      - AWS_CLOUDFRONT_PRIVATE_KEY_BASE64=${AWS_CLOUDFRONT_PRIVATE_KEY_BASE64}
      - CLOUDFRONT_SIGNED_URL_TTL_SECONDS=${CLOUDFRONT_SIGNED_URL_TTL_SECONDS}
      - VIDEO_UPLOAD_MAX_BYTES=${VIDEO_UPLOAD_MAX_BYTES}
      - VIDEO_PRESIGN_TTL_SECONDS=${VIDEO_PRESIGN_TTL_SECONDS}
      - VIDEO_MIN_WATCH_FOR_VIEW_SECONDS=${VIDEO_MIN_WATCH_FOR_VIEW_SECONDS}
  api:
    image: ghcr.io/denysdevelopment/laptopguru-crm-api:latest
    build: !reset null
    restart: always
    environment:
      - CORS_ORIGIN=https://crm.laptopguru.link
      - DATABASE_URL=${DATABASE_URL}
      - IMAP_HOST=${IMAP_HOST}
      - IMAP_PORT=${IMAP_PORT}
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASSWORD=${IMAP_PASSWORD}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_VIDEO_BUCKET=${AWS_S3_VIDEO_BUCKET}
      - AWS_CLOUDFRONT_DOMAIN=${AWS_CLOUDFRONT_DOMAIN}
      - AWS_CLOUDFRONT_KEY_PAIR_ID=${AWS_CLOUDFRONT_KEY_PAIR_ID}
      - AWS_CLOUDFRONT_PRIVATE_KEY_BASE64=${AWS_CLOUDFRONT_PRIVATE_KEY_BASE64}
      - AWS_MEDIACONVERT_ENDPOINT=${AWS_MEDIACONVERT_ENDPOINT}
      - AWS_MEDIACONVERT_ROLE_ARN=${AWS_MEDIACONVERT_ROLE_ARN}
      - AWS_MEDIACONVERT_QUEUE_ARN=${AWS_MEDIACONVERT_QUEUE_ARN}
      - YOUTUBE_OAUTH_CLIENT_ID=${YOUTUBE_OAUTH_CLIENT_ID}
      - YOUTUBE_OAUTH_CLIENT_SECRET=${YOUTUBE_OAUTH_CLIENT_SECRET}
      - YOUTUBE_OAUTH_REFRESH_TOKEN=${YOUTUBE_OAUTH_REFRESH_TOKEN}
      - YOUTUBE_DEFAULT_PRIVACY_STATUS=${YOUTUBE_DEFAULT_PRIVACY_STATUS}
volumes:
  uploads:
